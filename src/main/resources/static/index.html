<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heladería - Iniciar Sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-form-wrapper {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .auth-title {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }
        .auth-error {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
        }
        .input-group {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 1rem;
            padding: 0 10px;
            background: #fff;
        }
        .input-group:focus-within {
            border-color: #D32F2F;
        }
        .input-icon {
            display: flex;
            align-items: center;
            margin-right: 8px;
        }
        .input-group input {
            flex: 1;
            border: none;
            padding: 12px 0;
            outline: none;
            font-size: 1rem;
        }
        .toggle-password {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
            color: #757575;
        }
        .auth-btn {
            background-color: #D32F2F;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .auth-btn:hover {
            background-color: #b71c1c;
        }
        .auth-btn[disabled] {
            background-color: #ef9a9a;
            cursor: not-allowed;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="auth-form-wrapper">
        <h1 class="auth-title">Bienvenido de nuevo!</h1>

        <form class="auth-form" id="login-form">
            <div class="auth-error" id="login-error" style="display: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                </svg>
                <span id="error-text"></span>
            </div>

            <!-- Campo de email (adaptado para que coincida con el backend) -->
            <div class="input-group">
                <span class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D32F2F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </span>
                <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="Correo electrónico"
                    required
                    autocomplete="username"
                />
            </div>

            <!-- Campo de contraseña -->
            <div class="input-group">
                <span class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D32F2F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0110 0v4" />
                        <circle cx="12" cy="16" r="1" />
                    </svg>
                </span>
                <input
                    type="password"
                    name="password"
                    id="login-password"
                    placeholder="Contraseña"
                    required
                    autocomplete="current-password"
                />
                <button
                    type="button"
                    class="toggle-password"
                    aria-label="Mostrar contraseña"
                    id="toggle-password-btn"
                >
                    <!-- Ícono de ojo cerrado por defecto -->
                    <svg id="icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D32F2F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                    <!-- Ícono de ojo abierto oculto por defecto -->
                    <svg id="icon-eye" style="display: none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D32F2F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>

            <!-- Botón de ingreso -->
            <button
                type="submit"
                class="auth-btn"
                id="login-submit-btn"
            >
                <div id="btn-spinner" class="spinner" style="display: none;"></div>
                <span id="btn-text">Ingresar</span>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('login-password');
            const togglePasswordBtn = document.getElementById('toggle-password-btn');
            const iconEyeOff = document.getElementById('icon-eye-off');
            const iconEye = document.getElementById('icon-eye');
            const submitBtn = document.getElementById('login-submit-btn');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('btn-text');
            const errorContainer = document.getElementById('login-error');
            const errorText = document.getElementById('error-text');

            // Lógica para Mostrar/Ocultar contraseña
            togglePasswordBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'text') {
                    iconEyeOff.style.display = 'none';
                    iconEye.style.display = 'block';
                } else {
                    iconEyeOff.style.display = 'block';
                    iconEye.style.display = 'none';
                }
            });

            // Lógica de conexión con tu backend (API Spring Boot)
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Restablecer estado de carga UI
                errorContainer.style.display = 'none';
                submitBtn.disabled = true;
                btnSpinner.style.display = 'block';
                btnText.textContent = 'Ingresando...';

                // Usamos el cuerpo que espera nuestro endpoint local (/api/auth/login)
                const payload = {
                    email: emailInput.value,
                    contrasena: passwordInput.value
                };

                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Credenciales no válidas.');
                    }

                    // Redirección directa hacia la ventana de Swagger (los CRUDs)
                    window.location.href = '/swagger-ui/index.html';

                } catch (err) {
                    errorText.textContent = err.message;
                    errorContainer.style.display = 'flex';
                } finally {
                    submitBtn.disabled = false;
                    btnSpinner.style.display = 'none';
                    btnText.textContent = 'Ingresar';
                }
            });
        });
    </script>
</body>
</html>
